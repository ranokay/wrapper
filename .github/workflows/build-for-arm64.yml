name: Build for arm64

on:
  push:
    branches: [ "arm64" ]
  pull_request:
    branches: [ "arm64" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install aria2
      run: sudo apt install aria2 -y

    - name: Install LLVM
      run: sudo bash -c "$(wget -O - https://apt.llvm.org/llvm.sh)"

    - name: Install cross complier
      run: sudo apt install gcc-aarch64-linux-gnu -y
    
    - name: Set up Android NDK r23b
      run: | 
        aria2c -o android-ndk-r23b-linux.zip https://dl.google.com/android/repository/android-ndk-r23b-linux.zip
        unzip -q -d . android-ndk-r23b-linux.zip
      
    - name: Build
      run: |
        mkdir build
        cd build
        cmake ..
        make

    - name: Set outputs
      id: vars
      run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Create Release Zip File
      run: zip -r Wrapper.arm64.latest.zip rootfs/ android/ wrapper wrapper-rootless wrapper-android compose.yaml entrypoint.sh Dockerfile
      
    - name: Update Tag
      run: |
        git tag -f wrapper.arm64.latest
        git push origin wrapper.arm64.latest --force

    - name: Create or Update Release
      uses: softprops/action-gh-release@v2
      with:
        files: Wrapper.arm64.latest.zip
        body: |
          Latest arm64 build.
          Commit: ${{ github.sha }}
          Message: ${{ github.event.head_commit.message }}
        name: Wrapper.arm64.latest
        tag_name: wrapper.arm64.latest
        make_latest: true
        overwrite: true